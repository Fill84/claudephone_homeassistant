<!-- Scoped styles -->
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
    .material-icons {
        font-size: 24px;
        color: #fff;
        cursor: pointer;
    }

    .ma-card {
        background: #1e293b;
        border-radius: 8px;
        padding: 8px 10px;
        position: relative;
    }

    .ma-card[data-inactive="true"] {
        opacity: 0.45;
    }

    /* Header: player name + state */
    .ma-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .ma-name {
        font-weight: 600;
        font-size: 0.7rem;
        color: #94a3b8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ma-state {
        font-size: 0.65rem;
        text-transform: capitalize;
    }

    /* Main row: artwork | info | controls */
    .ma-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .ma-art {
        width: 44px;
        height: 44px;
        border-radius: 4px;
        object-fit: cover;
        flex-shrink: 0;
        display: none;
    }

    .ma-info {
        flex: 1;
        min-width: 0;
    }

    .ma-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: #e2e8f0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ma-artist {
        font-size: 0.72rem;
        color: #94a3b8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    /* Controls cluster */
    .ma-controls {
        display: none;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
    }

    .ma-controls button {
        background: none;
        border: none;
        color: #e2e8f0;
        cursor: pointer;
        padding: 2px;
        font-size: 0.85rem;
        line-height: 1;
    }

    .ma-controls button[data-cmd="playpause"] {
        font-size: 1.05rem;
    }

    /* Volume: icon in row, vertical slider on hover */
    .ma-vol-wrap {
        position: relative;
        display: flex;
        align-items: center;
    }

    .ma-vol-popup {
        display: none;
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: #0f172a;
        border-radius: 6px;
        padding: 10px 6px;
        margin-bottom: 4px;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        z-index: 10;
    }

    .ma-vol-wrap:hover .ma-vol-popup,
    .ma-vol-wrap:focus-within .ma-vol-popup,
    .ma-vol-wrap .ma-vol-popup:hover {
        display: flex;
    }

    .ma-vol-popup input[type="range"] {
        writing-mode: vertical-lr;
        direction: rtl;
        width: 4px;
        height: 80px;
        accent-color: #38bdf8;
    }

    .ma-vol-pct {
        font-size: 0.6rem;
        color: #94a3b8;
    }

    /* Progress bar */
    .ma-progress {
        display: none;
        margin-top: 4px;
    }

    .ma-progress-times {
        display: flex;
        justify-content: space-between;
        font-size: 0.6rem;
        color: #64748b;
    }

    .ma-progress-track {
        background: #0f172a;
        border-radius: 2px;
        height: 2px;
        margin-top: 2px;
    }

    .ma-progress-bar {
        background: #38bdf8;
        height: 100%;
        border-radius: 2px;
        width: 0%;
        transition: width 1s linear;
    }
</style>

<!-- Container for all players -->
<div id="ma-players" style="display:flex;flex-direction:column;gap:8px;padding:4px"></div>

<!-- Empty state -->
<div id="ma-empty" style="color:#64748b;font-size:0.85rem;text-align:center;padding:8px">
    No media players found
</div>

<!-- Error state -->
<div id="ma-error" style="display:none;color:#ef4444;font-size:0.85rem;text-align:center;padding:8px">
    Error loading players
</div>

<!-- Player card template -->
<template id="ma-card-tpl">
    <div class="ma-card">
        <!-- Header -->
        <div class="ma-header">
            <span class="ma-name" data-field="player_name"></span>
            <span class="ma-state" data-field="state"></span>
        </div>

        <!-- Main row: artwork | info | controls | volume -->
        <div class="ma-row">
            <img class="ma-art" data-field="artwork" alt="" onerror="this.style.display='none'">

            <div class="ma-info">
                <div class="ma-title" data-field="title"></div>
                <div class="ma-artist" data-field="artist"></div>
            </div>

            <div class="ma-controls" data-section="controls">
                <button data-cmd="previous" title="Previous">
                    <span class="material-icons">skip_previous</span>
                </button>
                <button data-cmd="playpause" title="Play">
                    <span class="material-icons">play_arrow</span>
                </button>
                <button data-cmd="next" title="Next">
                    <span class="material-icons">skip_next</span>
                </button>

                <div class="ma-vol-wrap">
                    <button type="button">
                        <span class="material-icons">volume_up</span>
                    </button>
                    <div class="ma-vol-popup">
                        <span class="ma-vol-pct" data-field="volume_pct">0%</span>
                        <input data-field="volume" type="range" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="ma-progress" data-section="progress">
            <div class="ma-progress-times">
                <span data-field="position">--:--</span>
                <span data-field="duration">--:--</span>
            </div>
            <div class="ma-progress-track">
                <div class="ma-progress-bar" data-field="bar"></div>
            </div>
        </div>
    </div>
</template>

<script>
    (function () {
        var ACTION = '/api/plugins/homeassistant/action';
        var tpl = document.getElementById('ma-card-tpl');

        function fmt(sec) {
            if (sec == null) return '--:--';
            var m = Math.floor(sec / 60);
            var s = Math.floor(sec % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        function stateColor(state) {
            if (state === 'playing') return '<span class="material-icons">pause</span>';
            if (state === 'paused') return '<span class="material-icons">play_arrow</span>';
            return '<span class="material-icons">pause</span>';
        }

        function buildCard(p) {
            var card = tpl.content.firstElementChild.cloneNode(true);
            var eid = p.entity_id;
            var isInactive = p.state === 'off' || p.state === 'unavailable';

            if (isInactive) card.dataset.inactive = 'true';
            card.dataset.entityId = eid;

            // Header
            card.querySelector('[data-field="player_name"]').textContent = p.player_name;
            var stateEl = card.querySelector('[data-field="state"]');
            stateEl.textContent = p.state;
            stateEl.style.color = stateColor(p.state);

            // Artwork
            if (p.artwork_url) {
                var art = card.querySelector('[data-field="artwork"]');
                art.src = p.artwork_url;
                art.style.display = 'flex';
            }

            // Track info
            card.querySelector('[data-field="title"]').textContent = p.title || '';
            card.querySelector('[data-field="artist"]').textContent = p.artist || '';

            // Progress
            if (p.duration && (p.title || p.artist)) {
                var prog = card.querySelector('[data-section="progress"]');
                prog.style.display = '';
                var pct = p.position ? Math.min(100, (p.position / p.duration) * 100) : 0;
                card.querySelector('[data-field="position"]').textContent = fmt(p.position);
                card.querySelector('[data-field="duration"]').textContent = fmt(p.duration);
                card.querySelector('[data-field="bar"]').style.width = pct + '%';
            }

            // Controls
            if (p.state !== 'unavailable') {
                var ctrl = card.querySelector('[data-section="controls"]');
                ctrl.style.display = 'flex';

                var ppBtn = card.querySelector('[data-cmd="playpause"]');
                if (p.state === 'playing') {
                    ppBtn.innerHTML = '<span class="material-icons">pause</span>';
                    ppBtn.title = 'Pause';
                }

                card.querySelector('[data-cmd="previous"]').addEventListener('click', function () { sendCmd('previous', eid); });
                ppBtn.addEventListener('click', function () { sendCmd(p.state === 'playing' ? 'pause' : 'play', eid); });
                card.querySelector('[data-cmd="next"]').addEventListener('click', function () { sendCmd('next', eid); });

                // Volume
                var volPct = p.volume != null ? Math.round(p.volume * 100) : 0;
                card.querySelector('[data-field="volume"]').value = volPct;
                card.querySelector('[data-field="volume_pct"]').textContent = volPct + '%';
                card.querySelector('[data-field="volume"]').addEventListener('input', function () {
                    card.querySelector('[data-field="volume_pct"]').textContent = this.value + '%';
                });
                card.querySelector('[data-field="volume"]').addEventListener('change', function () {
                    sendVolume(this.value, eid);
                });
            }

            return card;
        }

        async function refresh() {
            try {
                var r = await fetch(ACTION + '/media/all-players', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                var d = await r.json();
                var players = d.players || [];

                document.getElementById('ma-error').style.display = 'none';

                if (!players.length) {
                    document.getElementById('ma-empty').style.display = '';
                    document.getElementById('ma-players').innerHTML = '';
                    return;
                }

                document.getElementById('ma-empty').style.display = 'none';

                var container = document.getElementById('ma-players');
                container.innerHTML = '';
                for (var i = 0; i < players.length; i++) {
                    container.appendChild(buildCard(players[i]));
                }
            } catch (e) {
                document.getElementById('ma-empty').style.display = 'none';
                document.getElementById('ma-players').innerHTML = '';
                document.getElementById('ma-error').style.display = '';
            }
        }

        async function sendCmd(cmd, entityId) {
            try {
                await fetch(ACTION + '/media/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd, entity_id: entityId }),
                });
                setTimeout(refresh, 500);
            } catch (e) { }
        }

        async function sendVolume(pct, entityId) {
            try {
                await fetch(ACTION + '/media/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: 'volume', value: parseInt(pct) / 100, entity_id: entityId }),
                });
            } catch (e) { }
        }

        refresh();
        setInterval(refresh, 5000);
    })();
</script>
